name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev,http]
      - run: pip install psycopg-pool
      - run: ruff check src/
      - run: ruff format --check src/ 2>/dev/null || echo "format check skipped"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .[dev,http]
      - run: pip install psycopg-pool
      # Phase 1 + Phase 3 only (Phase 2 needs PostgreSQL + pgvector)
      - run: python3 -m pytest tests/test_phase1.py tests/test_phase3.py -v
